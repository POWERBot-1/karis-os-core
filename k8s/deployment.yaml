apiVersion: v1
kind: ConfigMap
metadata:
  name: karis-os-config
  namespace: karis-os-prod
data:
  PLATFORM_NAME: "KARIS OS™"
  PLATFORM_VERSION: "1.0.0-PROD-V1"
  DEFAULT_CURRENCY: "KES"
  DEFAULT_COUNTRY: "KE"
  KRT_MINT_ON_PURCHASE_RATIO: "0.05"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: karis-api-gateway
  namespace: karis-os-prod
  labels:
    app: karis-api-gateway
spec:
  replicas: 4
  selector:
    matchLabels:
      app: karis-api-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: karis-api-gateway
    spec:
      containers:
      - name: api-gateway
        image: karis-os-core:1.0.0-PROD-V1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        envFrom:
        - configMapRef:
            name: karis-os-config
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: karis-os-secrets
              key: DATABASE_URL
        livenessProbe:
          httpGet:
            path: /docs
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /docs
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
---
apiVersion: v1
kind: Service
metadata:
  name: karis-api-service
  namespace: karis-os-prod
spec:
  type: ClusterIP
  selector:
    app: karis-api-gateway
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: karis-os-ingress
  namespace: karis-os-prod
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - api.karis-os.ke
    - portal.karis-os.ke
    secretName: karis-os-tls-cert
  rules:
  - host: api.karis-os.ke
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: karis-api-service
            port:
              number: 80
